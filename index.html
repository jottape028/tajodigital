<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estamos em Manutenção | Uma Nova Era Está Chegando</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #0d0d13;
            color: #ffffff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Efeito de luz de fundo para dar profundidade */
        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255, 0, 0, 0.15) 0%, rgba(0,0,0,0) 70%);
            top: 20%;
            left: 30%;
            z-index: 1;
        }

        body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.05) 0%, rgba(0,0,0,0) 70%);
            bottom: 10%;
            right: 20%;
            z-index: 1;
        }

        .container {
            text-align: center;
            padding: 2rem;
            z-index: 2;
            max-width: 600px;
            width: 100%;
        }

        .logo {
            max-width: 220px;
            height: auto;
            margin-bottom: 2.5rem;
            animation: float 4s ease-in-out infinite;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 1rem;
            text-transform: uppercase;
            background: linear-gradient(45deg, #ffffff, #a1a1a1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.1rem;
            color: #8e8e93;
            margin-bottom: 3rem;
            line-height: 1.6;
        }

        /* Badge de status */
        .status-badge {
            display: inline-block;
            padding: 0.5rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px rgba(255, 255, 255, 0.1) solid;
            border-radius: 50px;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #e50914; /* Tom de vermelho imponente */
            font-weight: 600;
            margin-bottom: 1.5rem;
            animation: pulse 2s infinite;
        }

        .footer {
            margin-top: 4rem;
            font-size: 0.8rem;
            color: #444;
            letter-spacing: 1px;
        }

        /* Animações */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        /* Responsividade */
        @media (max-width: 480px) {
            h1 { font-size: 1.8rem; }
            p { font-size: 1rem; }
            .logo { max-width: 180px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Logomarca fornecida -->
                <img src="https://i.postimg.cc/nc6wbbJ8/952C6A93-4680-469B-A248-04ED08FE26C7.png" alt="Logo" class="logo">
        
        <div>
            <span class="status-badge">Breve Novidades</span>
        </div>
        
        <h1>A nova era está chegando</h1>
        <p>Estamos preparando uma experiência completamente renovada para você. Nosso site está passando por atualizações exclusivas e voltará ao ar em breve.</p>
        
        <div class="footer">
            &copy; 2026 Todos os direitos reservados.
        </div>
    </div>

</body>
</html>
